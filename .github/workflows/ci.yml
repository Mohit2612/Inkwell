name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          # Supabase — placeholders so the build succeeds in CI.
          # Real values live in Vercel / deployment env.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          OPENAI_API_KEY: sk-placeholder
          # Skip Sentry source-map upload in CI (no SENTRY_AUTH_TOKEN).
          SENTRY_AUTH_TOKEN: ""
